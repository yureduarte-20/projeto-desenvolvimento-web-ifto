<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}EletroService — Rastreamento{% endblock %}</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <link href="{{ url_for('static', filename='css/style.css') }}" rel="stylesheet">
</head>
<body class="bg-light">
    <nav class="navbar navbar-light bg-white border-bottom shadow-sm" aria-label="Navegação Pública">
        <div class="container">
            <a class="navbar-brand fw-bold text-primary" href="{{ url_for('tracking.search') }}">
                <i class="bi bi-lightning-charge-fill me-1"></i> EletroService
            </a>
        </div>
    </nav>

    <main id="main-content" class="container py-5" role="main" aria-label="Conteúdo Principal">
        {% block content %}{% endblock %}
    </main>

    <footer class="text-center text-muted py-4 border-top bg-white mt-5" role="contentinfo">
        <small>EletroService &copy; {{ 2026 }} — Acompanhamento de Ordens de Serviço</small>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="{{ url_for('static', filename='js/app.js') }}"></script>
</body>
</html>
